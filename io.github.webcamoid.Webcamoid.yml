app-id: io.github.webcamoid.Webcamoid
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: webcamoid
rename-icon: webcamoid
rename-desktop-file: webcamoid.desktop
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos
  - --device=all
modules:
  - name: webcamoid
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DWITH_FLATPAK_VCAM=OFF
    sources:
      - type: git
        url: https://github.com/webcamoid/webcamoid.git
        tag: 9.3.0
        commit: 171b91e378c9bfbd4c425415322971e4e8872108
      - type: patch
        paths:
          - fix-premature-end-of-document.patch
          - fix-appdata.patch
